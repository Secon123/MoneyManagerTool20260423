spring:
  datasource:
    url:  jdbc:mysql://172.17.64.155:3306/expense_tracker?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: your_jwt_secret_key_which_should_be_long_enough_for_hs512
  expiration: 86400000

server:
  port: 8080
  tomcat:
    threads:
      max: 200
    connection-timeout: 2000ms
